<!DOCTYPE html>
<html>
    <head>
        <title> REGISTRATION DOCUMENT </title>
    </head>
    <body bgcolor="lightgreen">
        <h2 align="center">Registration form</h2>
        <form>
            
            <table>
                <tr>
                    <td>Username:</td>
                    <td><input type="text" name="uname" placeholder="Enter username"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="text" name="password" placeholder="Enter password"></td>
                </tr>
                <tr>
                    <td>Email:<input type="email" size="20" name="email" placeholder="Enter email"></td>
                </tr>
                
                <tr>
                   <td> Date of Birth:
                    Date<select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                    Month<select>
                        <option>Jan</option>
                        <option>Feb</option>
                        <option>Nov</option>
                        <option>Dec</option>
                    </select>
                    Year<select>
                        <option>1999</option>
                        <option>2003</option>
                        <option>2005</option>
                        <option>2006</option>
                    </select>
                    </td>
                </tr>
                
                <tr>
                    <td>Gender:
                        <select>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                        
                    </td>
                </tr>
                <tr>
                   <td> <input type="submit" value="Register"></td>
                </tr>
                <tr>
                    <td> <input type="reset" value="Reset"></td>
                </tr>
                </table>
                
        </form>
        

    </body>
</html>
